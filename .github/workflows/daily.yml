name: Radar Immobiliare Giornaliero

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa le librerie
        # Abbiamo aggiunto beautifulsoup4 per pulire il testo delle email
        run: |
          pip install --upgrade google-generativeai requests beautifulsoup4

      - name: Esegui il Motore AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python update.py

      - name: Salva i nuovi dati
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add data.json
          git commit -m "Aggiornamento giornaliero immobili" || exit 0
          git push
